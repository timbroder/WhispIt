name: WhispIt

options:
  bundleIdPrefix: com.whispit
  deploymentTarget:
    iOS: "26.0"
  createIntermediateGroups: true
  groupSortPosition: top
  generateEmptyDirectories: true
  xcodeVersion: "26.3"

settings:
  base:
    DEVELOPMENT_TEAM: LTU7433MF2
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.1.0"
    CURRENT_PROJECT_VERSION: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: YES
    IPHONEOS_DEPLOYMENT_TARGET: "26.0"
    TARGETED_DEVICE_FAMILY: "1"
    SWIFT_EMIT_LOC_STRINGS: YES

targets:
  WhispItApp:
    type: application
    platform: iOS
    sources:
      - path: WhispItApp
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whispit.app
        PRODUCT_NAME: WhispIt
        INFOPLIST_FILE: WhispItApp/Info.plist
        CODE_SIGN_ENTITLEMENTS: WhispItApp/WhispItApp.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: YES
    dependencies:
      - target: WhispItKeyboard
    scheme:
      testTargets: []
      gatherCoverageData: false

  WhispItKeyboard:
    type: app-extension
    platform: iOS
    sources:
      - path: WhispItKeyboard
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.whispit.app.keyboard
        PRODUCT_NAME: WhispItKeyboard
        INFOPLIST_FILE: WhispItKeyboard/Info.plist
        CODE_SIGN_ENTITLEMENTS: WhispItKeyboard/WhispItKeyboard.entitlements
